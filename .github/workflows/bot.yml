name: CoinDCX Telegram Scanner

on:
  schedule:
    # Run every 15 minutes, offset from :00/:15/:30/:45 because GitHub
    # Actions scheduled workflows are best-effort and are often delayed or
    # dropped during high-load minute boundaries (especially the top of hour).
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coindcx-telegram-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: .alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Install dependencies
        run: python -m pip install -r requirement.txt

      - name: Verify scanner endpoint
        run: |
          git rev-parse HEAD
          python - <<'PY'
          import main

          print(main.COINDCX_MARKETS_URL)
          print(main.COINDCX_CANDLES_URL)
          assert main.COINDCX_MARKETS_URL == "https://api.coindcx.com/exchange/v1/markets_details"
          assert main.COINDCX_CANDLES_URL == "https://public.coindcx.com/market_data/candles"
          PY

      - name: Run CoinDCX scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
