name: FYERS Authorization URL Generator

on:
  workflow_dispatch:
    inputs:
      fyers_redirected_url:
        description: "Optional: paste the full redirected URL after authorizing FYERS to exchange it for an access token."
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-authorization-url:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirement.txt

      - name: Print FYERS authorization URL
        env:
          FYERS_APP_ID: ${{ vars.FYERS_APP_ID }}
FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
FYERS_REDIRECT_URI: ${{ vars.FYERS_REDIRECT_URI }}
        run: python fyers_access_token_generator.py

      - name: Exchange redirected URL for FYERS access token
        if: ${{ inputs.fyers_redirected_url != '' }}
        env:
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
          FYERS_REDIRECT_URI: ${{ secrets.FYERS_REDIRECT_URI }}
          FYERS_REDIRECTED_URL: ${{ inputs.fyers_redirected_url }}
        run: python fyers_access_token_generator.py
